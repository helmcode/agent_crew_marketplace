name: Build & Publish Images

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - '.github/**'
  workflow_dispatch:
    inputs:
      image:
        description: 'Image path to build, e.g. claude_code/aws (leave empty to build all)'
        required: false
        type: string

jobs:
  detect:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.matrix }}
      has_images: ${{ steps.changes.outputs.has_images }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine which images to build
        id: changes
        run: |
          # Helper: find all image dirs (2 levels: agent_type/image_name)
          find_all() {
            find . -maxdepth 3 -mindepth 3 -name Dockerfile -exec dirname {} \; \
              | sed 's|^./||' | sort
          }

          if [[ -n "${{ inputs.image }}" ]]; then
            # Manual trigger: specific image
            if [[ ! -f "${{ inputs.image }}/Dockerfile" ]]; then
              echo "::error::No Dockerfile found in ${{ inputs.image }}/"
              exit 1
            fi
            dirs='["${{ inputs.image }}"]'

          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger without input: build all
            dirs=$(find_all | jq -R . | jq -s -c .)

          else
            # Push event: check what changed
            prev_commit="${{ github.event.before }}"

            if [[ "$prev_commit" == "0000000000000000000000000000000000000000" ]]; then
              dirs=$(find_all | jq -R . | jq -s -c .)
            else
              # Detect changed image dirs (agent_type/image_name)
              dirs=$(git diff --name-only "$prev_commit" HEAD \
                | grep -E '^[^/]+/[^/]+/' \
                | cut -d'/' -f1,2 | sort -u \
                | while read -r dir; do
                    [[ -f "$dir/Dockerfile" ]] && echo "$dir"
                  done | jq -R . | jq -s -c .)
            fi
          fi

          if [[ "$dirs" == "[]" || "$dirs" == "null" || -z "$dirs" ]]; then
            echo "has_images=false" >> "$GITHUB_OUTPUT"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
          else
            echo "has_images=true" >> "$GITHUB_OUTPUT"
            echo "matrix=$dirs" >> "$GITHUB_OUTPUT"
          fi

          echo "Images to build: $dirs"

  build:
    name: Build ${{ matrix.image }}
    needs: detect
    if: needs.detect.outputs.has_images == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate image structure
        run: |
          dir="${{ matrix.image }}"
          errors=()

          [[ ! -f "$dir/Dockerfile" ]] && errors+=("Missing Dockerfile")
          [[ ! -f "$dir/VERSION" ]]    && errors+=("Missing VERSION")
          [[ ! -f "$dir/README.md" ]]  && errors+=("Missing README.md")

          agent_type="${dir%%/*}"
          if [[ "$agent_type" != "claude-code" && "$agent_type" != "open-code" ]]; then
            errors+=("Invalid agent type '$agent_type'. Must be claude-code/ or open-code/")
          fi

          if [[ -f "$dir/VERSION" ]]; then
            version=$(cat "$dir/VERSION" | tr -d '[:space:]')
            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              errors+=("VERSION must be valid semver (e.g., 0.1.0), got: '$version'")
            fi
          fi

          if [[ ${#errors[@]} -gt 0 ]]; then
            echo "::error::Structure validation failed for $dir:"
            for err in "${errors[@]}"; do
              echo "::error::  - $err"
            done
            echo ""
            echo "Required structure:"
            echo "  $dir/"
            echo "  ├── Dockerfile"
            echo "  ├── README.md"
            echo "  └── VERSION"
            exit 1
          fi

          echo "✓ Structure valid for $dir"

      - name: Compute image name and version
        id: meta
        run: |
          dir="${{ matrix.image }}"
          agent_type="${dir%%/*}"
          image_name="${dir#*/}"

          case "$agent_type" in
            claude-code) prefix="cc" ;;
            open-code)   prefix="oc" ;;
            *)           echo "::error::Unknown agent type: $agent_type"; exit 1 ;;
          esac

          version=$(cat "$dir/VERSION")

          echo "tag=agentcrew-${prefix}-${image_name}" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/helmcode/${{ steps.meta.outputs.tag }}:${{ steps.meta.outputs.version }}
            ghcr.io/helmcode/${{ steps.meta.outputs.tag }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/helmcode/agent_crew_marketplace
            org.opencontainers.image.description=AgentCrew marketplace image - ${{ steps.meta.outputs.tag }}
